<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Weight Chart</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <script type="text/javascript">
      google.charts.load('current', { packages: ['corechart'] });
      google.charts.setOnLoadCallback(drawChart);

      let fullData = null;       // full dataset
      let movingAvgData = null;  // full moving-average dataset
      let chart = null;          // chart instance
      let options = null;        // chart options

      function drawChart() {
        const queryString = encodeURIComponent('SELECT A, B');
        const query = new google.visualization.Query(
          'https://docs.google.com/spreadsheets/d/1SjoM1R8vgk_TRxRiBg_wnJqYKCnlEE30-3cfrcEilzQ/gviz/tq?sheet=Sheet1&tq=' + queryString
        );
        query.send(handleQueryResponse);
      }

      function handleQueryResponse(response) {
        if (response.isError()) {
          alert('Error in query: ' + response.getMessage() + ' ' + response.getDetailedMessage());
          return;
        }

        fullData = response.getDataTable();
        const rows = fullData.getNumberOfRows();

        // ------------------------------------------------------------
        // TOTAL DAYS + TOTAL WEIGHT CHANGE
        // ------------------------------------------------------------
        if (rows > 1) {
          const firstDate = fullData.getValue(0, 0);
          const lastDate = fullData.getValue(rows - 1, 0);

          const firstWeight = fullData.getValue(0, 1);
          const lastWeight = fullData.getValue(rows - 1, 1);

          const totalDays = Math.round((lastDate - firstDate) / (1000 * 60 * 60 * 24));
          const weightDiff = (lastWeight - firstWeight).toFixed(1);

          document.getElementById("stats_display").innerHTML =
            `<strong>Total Days Tracked:</strong> ${totalDays}<br>
             <strong>Total Weight Change:</strong> ${weightDiff} lbs`;
        }

        // ------------------------------------------------------------
        // BUILD MOVING AVERAGE DATASET
        // ------------------------------------------------------------
        movingAvgData = new google.visualization.DataTable();
        movingAvgData.addColumn('date', 'Date');
        movingAvgData.addColumn('number', 'Weight');
        movingAvgData.addColumn('number', '30-Day Avg');

        let weights = [];

        for (let i = 0; i < rows; i++) {
          const date = fullData.getValue(i, 0);
          const weight = fullData.getValue(i, 1);
          weights.push(weight);

          const start = Math.max(0, i - 30);
          const slice = weights.slice(start, i + 1);
          const avg = slice.reduce((a, b) => a + b, 0) / slice.length;

          movingAvgData.addRow([date, weight, avg]);
        }

        // ------------------------------------------------------------
        // CHART OPTIONS
        // ------------------------------------------------------------
        options = {
          title: 'Weight Chart (with 30-Day Trend Line)',
          hAxis: { title: 'Time' },
          vAxis: { title: 'Weight' },
          legend: { position: 'bottom' },
          curveType: 'function',
          series: {
            0: { color: '#3366cc' },
            1: { color: '#dc3912', lineWidth: 3 }
          }
        };

        chart = new google.visualization.LineChart(document.getElementById('chart_div'));

        // DEFAULT VIEW = MOST RECENT YEAR
        applyRange(365);

        // ------------------------------------------------------------
        // WEEKLY WEIGHT CHANGE CHART
        // ------------------------------------------------------------
        const weeklyData = new google.visualization.DataTable();
        weeklyData.addColumn('string', 'Week');
        weeklyData.addColumn('number', 'Avg Weekly Change');

        let weekStartIndex = 0;

        while (weekStartIndex < rows) {
          const endIndex = Math.min(weekStartIndex + 7, rows - 1);

          const startWeight = fullData.getValue(weekStartIndex, 1);
          const endWeight = fullData.getValue(endIndex, 1);
          const change = endWeight - startWeight;

          const weekLabel = `Week ${Math.floor(weekStartIndex / 7) + 1}`;
          weeklyData.addRow([weekLabel, change]);

          weekStartIndex += 7;
        }

        const weeklyOptions = {
          title: 'Average Weekly Weight Change',
          hAxis: { title: 'Week' },
          vAxis: { title: 'Weight Change (lbs)' },
          legend: 'none',
          colors: ['#109618']
        };

        const weeklyChart = new google.visualization.ColumnChart(document.getElementById('weekly_chart_div'));
        weeklyChart.draw(weeklyData, weeklyOptions);
      }

      // ------------------------------------------------------------
      // TIME RANGE FILTERING FUNCTION
      // ------------------------------------------------------------
      function applyRange(days) {
        const rows = movingAvgData.getNumberOfRows();
        const lastDate = movingAvgData.getValue(rows - 1, 0);

        const cutoff = new Date(lastDate.getTime() - days * 24 * 60 * 60 * 1000);

        const view = new google.visualization.DataView(movingAvgData);
        let startIndex = 0;

        for (let i = 0; i < rows; i++) {
          if (movingAvgData.getValue(i, 0) >= cutoff) {
            startIndex = i;
            break;
          }
        }

        view.setRows(startIndex, rows);
        chart.draw(view, options);
      }
    </script>
  </head>

  <body>
    <h2>Weight Chart</h2>
    <p>This is a weight recording and graphing application.</p>
    <p>New weight measurements can be recorded with the "Input New Weight" link to the left.</p>

    <!-- TIME RANGE BUTTONS -->
    <div style="margin-bottom: 15px;">
      <button onclick="applyRange(7)">1 Week</button>
      <button onclick="applyRange(30)">1 Month</button>
      <button onclick="applyRange(90)">3 Months</button>
      <button onclick="applyRange(180)">6 Months</button>
      <button onclick="applyRange(365)">1 Year</button>
      <button onclick="applyRange(730)">2 Years</button>
      <button onclick="applyRange(50000)">All</button>
    </div>

    <div id="chart_div" style="width: 900px; height: 500px;"></div>

    <div id="stats_display"
         style="margin: 20px 0; padding: 15px; background: #eef2f5; width: 350px; border-radius: 8px; font-size: 16px;">
      Loading statistics…
    </div>

    <h2>Weekly Weight Change</h2>
    <div id="weekly_chart_div" style="width: 900px; height: 400px;"></div>

  </body>
</html>
